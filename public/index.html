<!DOCTYPE html>
<html>
<head>
    <title>F1 Unofficial Page</title>
</head>
<body bgcolor="#e10600" text="white">

    <center>
        <table border="0" cellpadding="20" width="600" bgcolor="white">
            <tr>
                <td align="center">
                    <font face="Arial" color="#e10600" size="7">
                        <b>F1 UNOFFICIAL PAGE</b>
                    </font>
                    <br>
                    <font face="Arial" color="#333333" size="4">
                        Hello from a static file!
                    </font>
                    <hr color="#e10600" size="5">
                    
                    <font face="Arial" color="green" size="3">
                        <b>● Server is Online</b>
                    </font>
                </td>
            </tr>
        </table>

        <br>

        <table border="1" cellpadding="15" width="400" bgcolor="#333333">
            <tr>
                <td align="center">
                    <font face="Arial" size="4"><b>ADD NEW DRIVER</b></font>
                    <br><br>
                    <form id="item-form">
                        <input type="text" id="item-input" placeholder="Driver Name" required>
                        <input type="submit" value="ADD TO GRID">
                    </form>
                </td>
            </tr>
        </table>

        <br>

        <table border="0" width="300">
            <tr>
                <td>
                    <font face="Courier New" size="5">
                        <b>CURRENT GRID:</b>
                        <ul id="item-list"></ul>
                    </font>
                </td>
            </tr>
        </table>
    </center>

    <script>
        const form = document.getElementById('item-form');
        const input = document.getElementById('item-input');
        const list = document.getElementById('item-list');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const item = input.value.trim();
            if (item) {
                await fetch('/items', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ item })
                });
                input.value = '';
                loadItems();
            }
        });

        async function loadItems() {
            const response = await fetch('/items');
            const items = await response.json();
            list.innerHTML = items.map(item => `<li>${item}</li>`).join('');
        }

        loadItems();
    </script>
</body>
</html>
